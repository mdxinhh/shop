name: Keep Supabase Alive

on:
  schedule:
    - cron: '0 6 */3 * *'
  workflow_dispatch:

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping Supabase to prevent auto-pause
        run: |
          curl -s -o /dev/null -w "HTTP: %{http_code}\n" \
            "https://ddqhzdraugjtlsuoihpo.supabase.co/rest/v1/products?select=id&limit=1" \
            -H "apikey: sb_publishable_FYcP4FloIC7ukfaEc4kcYw_QhExoIRz" \
            -H "Authorization: Bearer sb_publishable_FYcP4FloIC7ukfaEc4kcYw_QhExoIRz"
